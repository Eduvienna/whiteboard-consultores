<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso · Whiteboard Consultores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --c-black:   #0e0e0e;
      --c-white:   #fafaf8;
      --c-gray-50: #f5f5f2;
      --c-gray-100:#ebebea;
      --c-gray-200:#d4d4d2;
      --c-gray-400:#9a9a98;
      --c-gray-600:#5c5c5a;
      --c-error:   #c0392b;
      --font-display: 'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;
      --radius-md: 12px;
      --radius-pill: 999px;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }
    html, body {
      height: 100%;
      font-family: var(--font-body);
      background: var(--c-white);
      color: var(--c-black);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      margin-bottom: 2.75rem;
      text-decoration: none;
    }
    .logo-main {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--c-black);
    }
    .logo-sub {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--c-gray-400);
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--c-white);
      border: 0.5px solid var(--c-gray-200);
      border-radius: 18px;
      padding: 2.25rem 2rem;
    }
    .card-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .card-sub {
      font-size: 13px;
      font-weight: 300;
      color: var(--c-gray-600);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* ── Form ── */
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--c-gray-600);
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 400;
      padding: 10px 14px;
      background: var(--c-gray-50);
      border: 0.5px solid var(--c-gray-200);
      border-radius: 10px;
      color: var(--c-black);
      outline: none;
      transition: border-color var(--transition), background var(--transition);
    }
    .field input:focus {
      border-color: var(--c-gray-600);
      background: var(--c-white);
    }

    /* ── Button ── */
    .btn-login {
      width: 100%;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      padding: 12px;
      margin-top: 0.5rem;
      background: var(--c-black);
      color: var(--c-white);
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .btn-login:hover { opacity: 0.82; }
    .btn-login:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Error ── */
    .error-msg {
      font-size: 13px;
      color: var(--c-error);
      margin-top: 1rem;
      text-align: center;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Footer link ── */
    .back-link {
      margin-top: 2rem;
      font-size: 13px;
      color: var(--c-gray-400);
      text-decoration: none;
      transition: color var(--transition);
    }
    .back-link:hover { color: var(--c-black); }
  </style>
</head>
<body>

  <a href="index.html" class="logo-wrap">
    <span class="logo-main">WB Consultores</span>
    <span class="logo-sub">Whiteboard Consultores</span>
  </a>

  <div class="card">
    <h1 class="card-title">Acceso</h1>
    <p class="card-sub">Ingresa con tu correo y contraseña de administrador.</p>

    <div class="field">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="btn-login">Entrar</button>
    <p class="error-msg" id="error-msg">Correo o contraseña incorrectos. Intenta de nuevo.</p>
  </div>

  <a href="index.html" class="back-link">← Volver al sitio</a>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── Configuración Supabase ──────────────────────────────
    const SUPABASE_URL = 'https://nzrlbmsrrqocmwvnrylr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56cmxibXNycnFvY213dm5yeWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDc1OTYsImV4cCI6MjA5NjA4MzU5Nn0.jbazECApTvL4Uw0lf2P1w6NCiNrYOB6R1rFfOsXM1Uo';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── Si ya hay sesión activa, redirige al panel ──────────
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'admin.html';
    });

    // ── Login ───────────────────────────────────────────────
    const btnLogin  = document.getElementById('btn-login');
    const errorMsg  = document.getElementById('error-msg');
    const emailEl   = document.getElementById('email');
    const passEl    = document.getElementById('password');

    async function handleLogin() {
      btnLogin.disabled = true;
      btnLogin.textContent = 'Verificando...';
      errorMsg.classList.remove('visible');

      const email    = emailEl.value.trim();
      const password = passEl.value;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = 'Error: ' + error.message;
        errorMsg.classList.add('visible');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      } else {
        window.location.href = 'admin.html';
      }
    }

    btnLogin.addEventListener('click', handleLogin);

    // Permite hacer login con Enter
    [emailEl, passEl].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    });
  </script>

</body>
</html>
